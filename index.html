<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ School, Address</title>
    <link rel="stylesheet" href="/CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="shortcut icon" href="/IMAGES/logo.jpg" type="image/x-icon">
    <style>
        .loader{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        img{
            display: block;
            margin: 150px auto;
        }
         button{
            background-color: orangered;
            width: 150px;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 1.1rem;
            color: white;
            cursor: progress;
            margin: 500px 0px 0px -100%;
            transition: 0.5s;
        }
        button:hover{
            background-color: green;
        }



    </style>
</head>
<body>
    <div class="loader">
       <img src="/IMAGES/loader.gif" alt="">
       <a href="/HTML/main.html"><button>Cancel Loader.</button></a>
    </div>
    <script src="/JS/loader.js"></script>
</body>
</html>
