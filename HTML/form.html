<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission</title>
    <link rel="stylesheet" href="/CSS/form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="shortcut icon" href="/IMAGES/logo.jpg" type="image/x-icon">
</head>
<body>
    <div class="main">
        <img src="/IMAGES/logo.jpg" alt="">
        <p>Your School Name,<br> </p> 
    </div>
    <div class="form">
        <div id="head">
           <h1>Student Admission Form</h1>
        </div>
        <form action="">
            <div id="student">
                <h3>Student Information</h3>
                <div id="line"></div>
            </div>
            <div id="detail">
                <span>
                   <label> Student's Name :</label>
                   <input type="text" name="" placeholder="" required>
                </span>
                <span>
                   <label>Date of Birth :</label>
                   <input type="Date" name="" placeholder="DD/MM/YYYY" required>
                </span>
                <span>
                    <label>Gender :</label>
                    <div id="radio">
                        <input type="radio" name="gender">
                    <label >Male</label>
                        <input type="radio" name="gender" id="ra1" >
                        <label>Female</label>
                    </div>
                </span>
            </div>
            <div class="gap"></div>
            <div id="student">
                <h3>Class Applied For</h3>
                <div id="line"></div>
            </div>
            <div id="check">
                <input type="checkbox" name="pre Nursery" >
                <label>Pre Nursery</label>
                <input type="checkbox" name="Nursery">
                <label>Nursery</label>
                <input type="checkbox" name="KG I" >
                <label> KG I</label>
                <input type="checkbox" name="KG II">
                <label>KG II</label>
                <input type="checkbox" name="class I" >
                <label>  Class I</label>
                <input type="checkbox" name="class II">
                <label> Class II</label>
                <input type="checkbox" name="class III" >
                <label> Class III</label>
                <input type="checkbox" name="class IV">
                <label> Class IV</label>
                <input type="checkbox" name="class V" >
                <label> Class V</label>
                <input type="checkbox" name="class VI">
                <label> Class VI</label>
                <input type="checkbox" name="class VII" >
                <label> Class VII</label>
                <input type="checkbox" name="class VIII">
                <label> Class VIII</label>
                <input type="checkbox" name="class IX" >
                <label> Class IX</label>
                <input type="checkbox" name="class XI">
                <label> Class XI</label>
            </div>
            <div class="gap"></div>
            <div id="student">
                <h3>Parents Information</h3>
                <div id="line"></div>
            </div>
            <div id="detail">
                <span>
                   <label>Father's Name :</label>
                   <input type="text" name="" placeholder="" required>
                </span>
                <span>
                   <label>Mother's Name :</label>
                   <input type="text" name="" placeholder=" " required>
                </span>
            </div>
            <div id="student">
                <h3>Contact Details</h3>
                <div id="line"></div>
            </div>
             <div class="photo">
                <div id="detail">
                    <span>
                        <label>Mobile Number :</label>
                        <input type="text" name="" placeholder="" required>
                    </span>
                    <span>
                        <label>Email ID :</label>
                        <input type="email" name="" placeholder="" required>
                    </span>
                    <div id="student">
                        <h3>Address</h3>
                        <div id="line"></div>
                    </div>
                    <div id="add">
                        <textarea name="" id="" placeholder="Enter Address" required></textarea>
                    </div>
                </div>
                
                <div id="upload">
                    <h3>Upload Student Photo</h3>
                    <img src="/IMAGES/photo.jpg" alt="">
                    <input type="file" name="" id="" required>
                </div>
             </div>
        </form>
        <a href=""> <button>Submit</button></a>
    </div>
    <footer>
         <div class="footer">
            <p>&copy XYZ School, Address 2026</p>
        </div>
    </footer>
</body>
</html>
