<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="/CSS/registration.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="shortcut icon" href="/IMAGES/logo.jpg" type="image/x-icon">
</head>
<body>
    <div class="main">
        <img src="/IMAGES/logo.jpg" alt="">
        <p>Your School Name,<br> </p> 
    </div>
    <div id="form">
        <form action="/HTML/fee.html">
            <h2><i class="fa fa-pencil" aria-hidden="true" id="info"></i> Please Enter Your Information</h2>
             <i class="fa fa-user" aria-hidden="true" id="fontawesome"></i><input type="text" value="" name="userID" placeholder="Create User ID " required >
             <br>
             <i class="fa fa-mobile" aria-hidden="true" id="fontawesome"></i><input type="number" value="" name="number" placeholder="Enter Your Mobile Number" required>
             <br>
             <i class="fa fa-envelope" aria-hidden="true" id="fontawesome"></i><input type="email" value="" name="EmailID" placeholder="Enter Email ID " required >
             <br>
             <i class="fa fa-unlock-alt" aria-hidden="true" id="fontawesome"></i><input type="password" name="password" id="password" placeholder="Create Password" required title="The Password should be of 8 Digit">
             <br>
              <i class="fa fa-unlock-alt" aria-hidden="true" id="fontawesome"></i><input type="password" name="confirmpassword" id="confirmpassword" placeholder="Confirm Password" required title="The Password should be of 8 Digit">
             <br>
             <i class="fa fa-calendar" aria-hidden="true"></i><select name="select1" id="select1">
                <option value="School Name">2026-27</option>
             </select>
             <br>
             <i class="fa fa-calendar-o" aria-hidden="true"></i><input type="date" value="" name="DOB" placeholder="DOB" required>
             <br>
             <i class="fa fa-graduation-cap" aria-hidden="true"></i><select name="select1" id="select2" required>
                <option >---Select Class-----</option>
                <option value="Nursery">Nursery</option>
                <option value="KG1">KG I</option>
                <option value="KG2">KG II</option>
                <option value="I">I</option>
                <option value="II">II</option>
                <option value="III">III</option>
                <option value="IV">IV</option>
                <option value="V">V</option>
                <option value="VI">VI</option>
                <option value="VII">VII</option>
                <option value="VIII">VIII</option>
                <option value="IX">IX</option>
                <option value="IX">XI</option>
             </select>
             <br>  
            <br>
            <button>Next</button>
            <br>
            <a href="teacher.html">Existing User  <i class="fa fa-arrow-right" aria-hidden="true"></i> </a>
        </form>
    </div>
    <footer >
        <div class="footer">
            <p> &copy XYZ School, Address 2026</p>
        </div>
    </footer>
</body>
</html>
